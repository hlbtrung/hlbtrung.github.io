<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Happy Birthday chị Trâm</title>
<style>
  :root {
    --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
    --glass: rgba(255,255,255,.08);
    --accent: #ffd166;
  }
  html,body{height:100%;margin:0}
  body{
    background: radial-gradient(1200px 800px at 70% 20%, #1b1b2f 0%, #0d0d1a 50%, #05050a 100%),
                linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    color:#fff; font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;
  }
  canvas{position:fixed;inset:0;z-index:0}
  .wrap{
    position:relative; z-index:1; height:100%; display:grid; place-items:center; text-align:center; padding:24px;
  }
  .card{
    padding:24px 28px; border-radius:16px; background:var(--glass); backdrop-filter: blur(8px);
    box-shadow: 0 10px 40px rgba(0,0,0,.35); max-width:720px; animation: rise .9s ease-out both;
  }
  @keyframes rise{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  h1{margin:0 0 12px;font-size:clamp(28px,6vw,56px);letter-spacing:.5px}
  h1 .shine{
    background: linear-gradient(90deg,#fff, #ffe9a3, #fff);
    -webkit-background-clip:text; background-clip:text; color:transparent; background-size:200% 100%;
    animation: shine 3s linear infinite;
  }
  @keyframes shine{0%{background-position:0% 0}100%{background-position:200% 0}}
  p{margin:8px 0 16px;font-size:clamp(15px,2.6vw,18px);opacity:.95}
  .btns{display:flex; gap:10px; flex-wrap:wrap; justify-content:center}
  button{
    cursor:pointer; border:0; border-radius:999px; padding:12px 18px; font-weight:600; font-size:15px;
    background:#7bdff2; color:#0b0b16; transition:.2s transform,.2s filter;
  }
  button:hover{transform:translateY(-1px); filter:brightness(1.05)}
  .btn2{background:#caffbf}
  .credit{position:fixed; right:10px; bottom:10px; font-size:12px; opacity:.7}
  .floating{
    position:fixed; inset:0; pointer-events:none; z-index:0; background:
    radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.35) 0 50%, transparent 55%) repeat,
    radial-gradient(1.5px 1.5px at 80% 60%, rgba(255,255,255,.25) 0 50%, transparent 55%) repeat;
    background-size: 260px 260px, 220px 220px;
    animation: drift 18s linear infinite;
  }
  @keyframes drift{to{background-position:260px 0, -220px 0}}
</style>
</head>
<body>
<canvas id="fw"></canvas>
<div class="floating"></div>

<div class="wrap">
  <div class="card" role="group" aria-label="Thiệp chúc mừng sinh nhật">
    <h1><span class="shine">Happy Birthday, chị ! 🎂</span></h1>
    <p>Chúc sinh nhật siêu vui vẻ, nhiều may mắn </p>
    <p style="margin-top:-2px;color:#ffd166">Click bất kỳ nơi nào để bắn pháo hoa. Nhấn “Bật nhạc” để phát bài hát.</p>
    <div class="btns">
      <button id="playBtn">🔊 Bật nhạc</button>
      <button class="btn2" id="boomBtn">🎉 Bắn pháo hoa</button>
    </div>
    <audio id="music" preload="auto">
      <!-- Thay src này bằng link MP3 bạn có, ví dụ bản Doraemon -->
      <source src="https://5v3sg6nyac.ucarecd.net/9593887d-dfce-4633-81f9-c8524dd829ad/HappRakkBsudHappyLuckyBirthdayRomajiEnglish.mp3" type="audio/mpeg">
      Trình duyệt không hỗ trợ audio.
    </audio>
  </div>
</div>

<div class="credit">Made for chị Trâm • by Trung</div>

<script>
(function(){
  const canvas = document.getElementById('fw');
  const ctx = canvas.getContext('2d', { alpha: true });
  let W, H, dpr = Math.min(2, window.devicePixelRatio || 1);
  function resize(){
    W = canvas.width = Math.floor(innerWidth * dpr);
    H = canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
  }
  addEventListener('resize', resize, {passive:true});
  resize();

  // Fireworks engine
  const rand = (a,b)=>Math.random()*(b-a)+a;
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const gravity = 0.08 * dpr;
  const friction = 0.995;

  const rockets = [];
  const particles = [];
  const hues = [0,20,40,60,100,160,200,260,300];
  function spawnRocket(x,y,autoBurst=true){
    rockets.push({
      x, y, vx: rand(-0.8,0.8)*dpr, vy: rand(-7.5,-9.8)*dpr,
      hue: hues[(Math.random()*hues.length)|0], life: 0, autoBurst
    });
  }
  function burst(x,y,hue,count=120,spread=2.2){
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const spd = Math.pow(Math.random(),0.35)*spread*rand(1.5,3.6)*dpr;
      particles.push({
        x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
        hue: hue + rand(-18,18), alpha: 1, size: rand(1.2,2.4)*dpr, life:0
      });
    }
    // Spark core
    for(let i=0;i<24;i++){
      particles.push({x,y,vx:rand(-1,1)*dpr,vy:rand(-1,1)*dpr,hue:hue+rand(-10,10),alpha:1,size:rand(1.5,3)*dpr,life:0});
    }
  }

  let last = performance.now();
  function tick(now){
    const dt = clamp((now - last)/16.67, 0.5, 1.5);
    last = now;

    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0,0,W,H);

    // update rockets
    for(let i=rockets.length-1;i>=0;i--){
      const r = rockets[i];
      r.life += dt;
      r.vy += gravity*0.65*dt;
      r.x += r.vx*dt; r.y += r.vy*dt;

      // trail
      ctx.beginPath();
      ctx.arc(r.x, r.y, 2*dpr, 0, Math.PI*2);
      ctx.fillStyle = `hsl(${r.hue},100%,70%)`;
      ctx.fill();

      // auto burst near apex or height
      if(r.autoBurst && (r.vy > -0.2 || r.y < H*0.2 || r.life>120)){
        burst(r.x, r.y, r.hue);
        rockets.splice(i,1);
      }
      // bounds
      if(r.y > H+50*dpr || r.x< -50*dpr || r.x > W+50*dpr) rockets.splice(i,1);
    }

    // update particles
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life += dt;
      p.vy += gravity*dt;
      p.vx *= Math.pow(friction,dt); p.vy *= Math.pow(friction,dt);
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.alpha *= Math.pow(0.985,dt);

      // draw
      const grd = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,6*dpr);
      grd.addColorStop(0, `hsla(${p.hue},100%,70%,${p.alpha})`);
      grd.addColorStop(1, `hsla(${p.hue},100%,50%,0)`);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();

      if(p.alpha < 0.02 || p.y>H+40*dpr) particles.splice(i,1);
    }

    // occasional auto launch
    if(Math.random() < 0.04 && particles.length < 1800){
      spawnRocket(rand(W*0.15, W*0.85), H+10*dpr);
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // interactions
  const boomBtn = document.getElementById('boomBtn');
  addEventListener('click', (e)=>{
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * dpr;
    const y = (e.clientY - rect.top) * dpr;
    // Launch then burst at click
    spawnRocket(x, H+10*dpr, false);
    setTimeout(()=>burst(x, y, hues[(Math.random()*hues.length)|0]), 260);
  });

  // Audio
  const music = document.getElementById('music');
  const playBtn = document.getElementById('playBtn');
  let started = false;
  function startMusic(){
    if(started) return;
    started = true;
    music.volume = 0.95;
    music.play().catch(()=>{ /* blocked until user gesture */ });
    playBtn.textContent = '⏸️ Tạm dừng';
  }
  playBtn.addEventListener('click', ()=>{
    if(music.paused){ music.play(); playBtn.textContent = '⏸️ Tạm dừng'; }
    else{ music.pause(); playBtn.textContent = '🔊 Bật nhạc'; }
  });
  // allow keyboard space to toggle
  addEventListener('keydown', e=>{
    if(e.code==='Space'){ e.preventDefault(); playBtn.click(); }
  });
  // first interaction: start music + a big burst
  ['click','touchstart','keydown'].forEach(evt=>{
    addEventListener(evt, ()=>{ startMusic(); }, { once:true, passive:true });
  });

})();
</script>
</body>
</html>
